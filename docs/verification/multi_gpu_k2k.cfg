\* TLC configuration for multi_gpu_k2k.tla
\* 2 GPUs joined by NVLink; 3 actors; 3 messages.
\* NVLinkedGPUs is the set of GPUs in a mutual-NVLink clique.
\* ActorGpu uses DefaultActorGpu (first actor → first GPU, rest → second).

SPECIFICATION Spec

CONSTANTS
  GPUs         = {g1, g2}
  Actors       = {a1, a2, a3}
  ActorGpu     <- DefaultActorGpu
  NVLinkedGPUs = {g1, g2}
  MaxMsgs      = 3

\* Once all messages have been sent, routed, and delivered, no Next
\* action is enabled. That terminal state is expected — not a bug.
CHECK_DEADLOCK
  FALSE

INVARIANTS
  TypeOK
  DeliverySemantics
  BoundedLatency
