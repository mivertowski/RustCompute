\* TLC configuration for multi_gpu_k2k.tla
\* 2 GPUs joined by NVLink; 3 actors; 3 messages.
\* NVLinkedGPUs is the set of GPUs in a mutual-NVLink clique.

SPECIFICATION Spec

CONSTANTS
  GPUs         = {g1, g2}
  Actors       = {a1, a2, a3}
  ActorGpu     = (a1 :> g1 @@ a2 :> g2 @@ a3 :> g2)
  NVLinkedGPUs = {g1, g2}
  MaxMsgs      = 3

INVARIANTS
  TypeOK
  DeliverySemantics
  BoundedLatency
