\* TLC configuration for tenant_isolation.tla
\* 2 tenants, 3 kernels, 3 messages.

SPECIFICATION Spec

CONSTANTS
  Tenants = {t1, t2}
  Kernels = {k1, k2, k3}
  MaxMsgs = 3

\* Once all messages have been sent and either delivered or rejected,
\* no Next action is enabled. Terminal state is expected — not a bug.
CHECK_DEADLOCK
  FALSE

INVARIANTS
  TypeOK
  NoSameMessageInBothTenants
  CrossTenantRejected
  IsolationByConstruction
  InboxesWellFormed
