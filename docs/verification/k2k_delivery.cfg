\* TLC configuration for k2k_delivery.tla
\* 2 actors, 4 messages, queue capacity 2.

SPECIFICATION Spec

CONSTANTS
  Actors   = {a1, a2}
  MaxMsgs  = 4
  QueueCap = 2

\* Once all messages have been sent, delivered or dropped, no Next
\* action is enabled. Terminal state is expected — not a bug.
CHECK_DEADLOCK
  FALSE

INVARIANTS
  TypeOK
  QueueBoundOK
  DeliveredImpliesAccepted
  NoMessageLoss
  FIFOPerSender
  NoDuplicateDelivery
  DropAcceptedDisjoint
