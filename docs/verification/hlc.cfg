\* TLC configuration for hlc.tla
\* Small bounded model: 2 nodes, physical time up to 3, at most 4
\* events. This keeps state-space under 10^4 (see paper §6.7
\* target) — the HLC spec's receive rule branches on the emitted
\* events sequence, so each additional event doubles the reachable
\* state count.

SPECIFICATION Spec

CONSTANTS
  Nodes        = {n1, n2}
  MaxPhysical  = 3
  MaxEvents    = 4

\* MaxEvents and MaxPhysical create terminal states (nothing enabled
\* once both bounds saturate). That is not a bug — disable TLC's
\* default deadlock detector.
CHECK_DEADLOCK
  FALSE

INVARIANTS
  TypeOK
  PhysicalTimeMonotonic
  CausalOrdering
  PerNodeMonotonic
  EventCountsBounded
