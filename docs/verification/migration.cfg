\* TLC configuration for migration.tla
\* 4 messages is enough to exercise every transition while keeping the
\* state graph small (sub-second check time on a laptop).

SPECIFICATION Spec

CONSTANTS
  MaxMsgs = 4

\* Once migration completes through all three phases, no Next action
\* is enabled. Terminal state is expected — not a bug.
CHECK_DEADLOCK
  FALSE

INVARIANTS
  TypeOK
  PhaseLegal
  AtomicSwap
  NoMessageLoss
  FIFOPreserved
  ChecksumMatch
