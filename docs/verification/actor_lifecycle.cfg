\* TLC configuration for actor_lifecycle.tla
\* 3 actors — DefaultParent (in the .tla) makes one CHOOSE-picked
\* actor ROOT-parented and the other two its children. 8 steps is
\* enough to reach every reachable state in this bounded graph.

SPECIFICATION Spec

CONSTANTS
  Actors   = {a1, a2, a3}
  Parent   <- DefaultParent
  MaxSteps = 8

\* All actors reach Terminated in the bounded model; that terminal
\* state has no enabled Next action and is expected, not a bug.
CHECK_DEADLOCK
  FALSE

INVARIANTS
  TypeOK
  StateTransitionsLegal
  ChildActorsTerminate
  RestartPreservesState
  SnapshotMonotonic
